<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auguri Bro!</title>
    <style>
        /* === STILI GENERALI === */
        body {
            background-color: #1c1c1e;
            color: #ffffff;
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        h1 {
            font-family: 'Impact', sans-serif;
            font-size: 3.5rem;
            letter-spacing: 2px;
            text-align: center;
            margin-bottom: 5px;
            text-shadow: 3px 3px 0px #000;
        }

        p.subtitle {
            color: #39ff14;
            /* Verde fluo/neon */
            font-weight: bold;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 50px;
        }

        /* Nascondiamo il checkbox che fa da "interruttore" */
        #toggle-box {
            display: none;
        }

        /* === IL PACCO E LA SCENA === */
        .scene {
            position: relative;
            width: 320px;
            height: 320px;
            cursor: pointer;
        }

        /* La Scatola Chiusa */
        .box {
            position: absolute;
            width: 100%;
            height: 100%;
            background-color: #8b5a2b;
            /* Marrone cartone */
            border: 5px solid #000;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-weight: bold;
            font-size: 1.8rem;
            color: #fff;
            box-shadow: 15px 15px 0px rgba(0, 0, 0, 0.6);
            transition: transform 0.3s, opacity 0.4s;
            z-index: 2;
        }

        /* Il nastro verde sulla scatola */
        .box::before {
            content: '';
            position: absolute;
            top: 50%;
            left: -5px;
            right: -5px;
            height: 40px;
            background-color: #39ff14;
            border-top: 5px solid #000;
            border-bottom: 5px solid #000;
            transform: translateY(-50%);
        }

        /* L'etichetta sulla scatola */
        .box span {
            position: relative;
            z-index: 3;
            background: #222;
            padding: 15px;
            transform: rotate(-5deg);
            border: 3px solid #39ff14;
            box-shadow: 4px 4px 0px #000;
        }

        .box:hover {
            transform: scale(1.05) rotate(2deg);
        }

        /* === LA SORPRESA (Nascosta all'inizio) === */
        .surprise {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transform: scale(0.1) translateY(100px);
            transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1;
        }

        .middle-finger {
            font-size: 10rem;
            /* Bello grande */
            margin: 0;
            line-height: 1;
            filter: drop-shadow(0px 10px 10px rgba(0, 0, 0, 0.8));
        }

        /* Il fumetto del messaggio */
        .message {
            margin-top: 20px;
            background: #fff;
            color: #000;
            padding: 12px 25px;
            border-radius: 30px;
            font-weight: 900;
            font-size: 1.3rem;
            border: 4px solid #000;
            position: relative;
            text-align: center;
        }

        /* La puntina del fumetto */
        .message::after {
            content: '';
            position: absolute;
            bottom: 100%;
            left: 50%;
            margin-left: -12px;
            border-width: 12px;
            border-style: solid;
            border-color: transparent transparent #000 transparent;
        }

        .message::before {
            content: '';
            position: absolute;
            bottom: 100%;
            left: 50%;
            margin-left: -8px;
            border-width: 8px;
            border-style: solid;
            border-color: transparent transparent #fff transparent;
            z-index: 2;
        }

        /* === ANIMAZIONE AL CLICK === */
        /* Quando si clicca, la scatola sparisce volando su... */
        #toggle-box:checked~.scene .box {
            opacity: 0;
            transform: scale(1.3) translateY(-150px) rotate(10deg);
            pointer-events: none;
        }

        /* ...e la sorpresa compare con un effetto "molla" */
        #toggle-box:checked~.scene .surprise {
            opacity: 1;
            transform: scale(1) translateY(0);
            z-index: 3;
        }
    </style>
</head>

<body>

    <h1>BUON COMPLEANNO, VECCHIO! 🎂</h1>
    <p class="subtitle">Un regalo speciale solo per te, bro</p>

    <input type="checkbox" id="toggle-box">

    <label for="toggle-box" class="scene">

        <div class="box">
            <span>APRI SE HAI<br>CORAGGIO! 🔥</span>
        </div>

        <div class="surprise">
            <div class="middle-finger">🖕</div>
            <div class="message">HBD! MA ANCHE NO 😂</div>
        </div>

    </label>

</body>

</html>
